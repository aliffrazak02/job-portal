name: Deploy

on:
  push:
    branches: [main, production]

# Cancel any in-progress deploy for this branch when a new push arrives
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate: reuse the existing CI workflow ─────────────────────────────────────
  ci:
    name: CI (lint + test + e2e)
    uses: ./.github/workflows/ci.yml

  # ── Deploy backend to Render ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            -o /dev/null \
            -w "Render responded: HTTP %{http_code}\n"

  # ── Deploy frontend to Vercel ─────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
