name: CD

on:
  workflow_run:
    workflows: [CI]          # triggers when the CI workflow finishes
    branches: [main, production]
    types: [completed]

# Cancel a queued deploy for the same branch if a newer one arrives
concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  # ── Deploy backend to Render ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            -o /dev/null \
            -w "Render responded: HTTP %{http_code}\n"

  # ── Deploy frontend to Vercel ───────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}  # deploy the exact commit CI tested

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
