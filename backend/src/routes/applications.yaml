tags:
  - name: Applications
    description: Job application submission

/api/applications:
  post:
    summary: Submit a job application
    tags: [Applications]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [name, email, jobTitle, resume]
            properties:
              name:
                type: string
              email:
                type: string
                format: email
              jobTitle:
                type: string
              resume:
                type: string
                format: binary
              coverLetter:
                type: string
                format: binary
    responses:
      201:
        description: Application submitted
      400:
        description: Validation error
