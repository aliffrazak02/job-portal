components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Invalid credentials

    ValidationErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              msg:
                type: string
                example: Valid email is required
              path:
                type: string
                example: email
              location:
                type: string
                example: body

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalItems:
          type: integer
          example: 25
        totalPages:
          type: integer
          example: 3
        hasNextPage:
          type: boolean
          example: true
        hasPrevPage:
          type: boolean
          example: false
