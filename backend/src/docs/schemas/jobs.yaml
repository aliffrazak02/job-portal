components:
  schemas:
    JobListing:
      type: object
      properties:
        id:
          type: string
          example: 665f1a2b3c4d5e6f7a8b9c0d
        title:
          type: string
          example: Software Engineer
        company:
          type: string
          example: Tech Corp
        location:
          type: string
          example: New York, NY
        description:
          type: string
          example: We are looking for a skilled Software Engineer...
        requirements:
          type: array
          items:
            type: string
          example: [3+ years of experience with Node.js..., Experience with MongoDB...]
        salaryRange:
          type: string
          example: $80,000 - $120,000
        workType:
          type: string
          enum: [Full-time, Part-time, Contract, Internship]
          example: Full-time
        postedBy:
          type: object
          properties:
            id:
              type: string
              example: 665f1a2b3c4d5e6f7a8b9c0d
            name:
              type: string
              example: Alice Smith
            email:
              type: string
              format: email
              example: alice@example.com

    PaginatedJobsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/JobListing'
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 10
            totalItems:
              type: integer
              example: 25
            totalPages:
              type: integer
              example: 3
            hasNextPage:
              type: boolean
              example: true
            hasPrevPage:
              type: boolean
              example: false

    CreateJobRequest:
      type: object
      required: [title, company, location, description, workType]
      properties:
        title:
          type: string
          example: Software Engineer
        company:
          type: string
          example: Tech Corp
        location:
          type: string
          example: New York, NY
        description:
          type: string
          example: We are looking for a skilled Software Engineer...
        requirements:
          type: array
          items:
            type: string
          example: [3+ years of experience with Node.js..., Experience with MongoDB...]
        salaryRange:
          type: string
          example: $80,000 - $120,000
        workType:
          type: string
          enum: [Full-time, Part-time, Contract, Internship]
          example: Full-time
