components:
  schemas:
    Application:
      type: object
      properties:
        _id:
          type: string
          example: 665f1a2b3c4d5e6f7a8b9c0d
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        job:
          type: string
          description: MongoDB ObjectId of the job listing
          example: 665f1a2b3c4d5e6f7a8b9c0e
        applicant:
          type: string
          description: MongoDB ObjectId of the jobseeker who submitted
          example: 665f1a2b3c4d5e6f7a8b9c0f
        applicationStatus:
          type: string
          enum: [pending, reviewed, shortlisted, rejected]
          default: pending
          example: pending
        resumePath:
          type: string
          example: uploads/1234567890-resume.pdf
        coverLetterPath:
          type: string
          example: uploads/1234567890-coverletter.pdf
        createdAt:
          type: string
          format: date-time
          example: 2026-03-27T10:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-27T10:00:00.000Z

    SubmitApplicationRequest:
      type: object
      required: [name, email, jobId, resume]
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        jobId:
          type: string
          description: MongoDB ObjectId of the job being applied to
          example: 665f1a2b3c4d5e6f7a8b9c0e
        resume:
          type: string
          format: binary
        coverLetter:
          type: string
          format: binary

    UpdateApplicationStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, reviewed, shortlisted, rejected]
          example: shortlisted

    UpdateApplicationStatusResponse:
      type: object
      properties:
        message:
          type: string
          example: Status updated.
        applicationStatus:
          type: string
          enum: [pending, reviewed, shortlisted, rejected]
          example: shortlisted
