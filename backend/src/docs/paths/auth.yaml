/api/auth/register:
  post:
    summary: Register a new user
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterRequest'
    responses:
      201:
        description: User created - returns JWT token and user object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResponse'
      400:
        description: Validation error or email already registered
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ValidationErrorResponse'
                - $ref: '#/components/schemas/ErrorResponse'
            examples:
              emailTaken:
                summary: Email already registered
                value:
                  message: Email already registered
              validationFailed:
                summary: Validation failed
                value:
                  errors:
                    - msg: Valid email is required
                      path: email
                      location: body
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/auth/login:
  post:
    summary: Log in with email and password
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      200:
        description: Login successful - returns JWT token and user object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResponse'
      400:
        description: Validation error (missing or malformed fields)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidationErrorResponse'
      401:
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/auth/me:
  get:
    summary: Get the currently authenticated user
    tags: [Auth]
    security:
      - BearerAuth: []
    responses:
      200:
        description: Returns the authenticated user's profile
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      401:
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            examples:
              noToken:
                summary: No token provided
                value:
                  message: Not authorized, no token
              invalidToken:
                summary: Token invalid or expired
                value:
                  message: Not authorized, token invalid

/api/auth/change-password:
  put:
    summary: Change the current user's password
    tags: [Auth]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ChangePasswordRequest'
    responses:
      200:
        description: Password updated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageResponse'
      400:
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidationErrorResponse'
      401:
        description: Not authenticated or current password incorrect
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            examples:
              notAuthenticated:
                summary: Missing or invalid token
                value:
                  message: Not authorized, no token
              wrongPassword:
                summary: Current password incorrect
                value:
                  message: Current password is incorrect
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
