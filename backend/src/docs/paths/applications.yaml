/api/applications/stats:
  get:
    summary: Get my application statistics
    description: Jobseeker-only. Returns a count of the authenticated jobseeker's applications grouped by status.
    tags: [Applications – Jobseeker]
    security:
      - BearerAuth: []
    responses:
      200:
        description: Application counts by status
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationStats'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not a jobseeker)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/applications/mine:
  get:
    summary: Get my applications
    description: Jobseeker-only. Returns all applications submitted by the authenticated jobseeker, paginated, with job details and current status.
    tags: [Applications – Jobseeker]
    security:
      - BearerAuth: []
    parameters:
      - in: query
        name: page
        required: false
        description: Page number (starts at 1)
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: limit
        required: false
        description: Number of records per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      200:
        description: Paginated list of the jobseeker's applications
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Application'
                pagination:
                  $ref: '#/components/schemas/Pagination'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not a jobseeker)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/applications/received:
  get:
    summary: Get all received applications
    description: Employer-only. Returns all applications across all the authenticated employer's job listings, paginated. Optionally filter by status, job, or applicant name/email.
    tags: [Applications – Employer]
    security:
      - BearerAuth: []
    parameters:
      - in: query
        name: applicationStatus
        required: false
        description: Filter by application status
        schema:
          type: string
          enum: [pending, reviewed, shortlisted, rejected]
      - in: query
        name: jobId
        required: false
        description: Narrow to applications for a specific job (must be owned by the employer)
        schema:
          type: string
      - in: query
        name: search
        required: false
        description: Search applicant name or email (case-insensitive)
        schema:
          type: string
      - in: query
        name: page
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      200:
        description: Paginated list of received applications
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/Application'
                pagination:
                  $ref: '#/components/schemas/Pagination'
      400:
        description: Validation error (invalid query params)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidationErrorResponse'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not an employer, or jobId belongs to another employer)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/applications:
  post:
    summary: Submit a job application
    description: Jobseeker-only. Submits a new application for an active job listing.
    tags: [Applications – Jobseeker]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/SubmitApplicationRequest'
    responses:
      201:
        description: Application submitted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Application submitted successfully!
                applicationId:
                  type: string
                  example: 665f1a2b3c4d5e6f7a8b9c0d
      400:
        description: Validation error or job not active
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
            examples:
              missingFields:
                summary: Missing required fields
                value:
                  message: Name, email, phone, and job ID are required.
              invalidEmail:
                summary: Invalid email
                value:
                  message: Please provide a valid email address.
              invalidPhone:
                summary: Invalid phone number
                value:
                  message: Please provide a valid phone number.
              missingResume:
                summary: Resume not attached
                value:
                  message: Resume is required.
              jobClosed:
                summary: Job is no longer active
                value:
                  message: This job is no longer accepting applications.
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not a jobseeker)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      404:
        description: Job not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/applications/{id}/status:
  patch:
    summary: Update application status
    description: Employer-only. Updates the review status of an application for a job they own.
    tags: [Applications – Employer]
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        description: MongoDB ObjectId of the application
        schema:
          type: string
          pattern: '^[a-f0-9]{24}$'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateApplicationStatusRequest'
    responses:
      200:
        description: Status updated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationStatusResponse'
      400:
        description: Invalid status value or invalid application id
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not employer or does not own the job)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      404:
        description: Application not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
