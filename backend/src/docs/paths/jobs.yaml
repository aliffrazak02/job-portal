/api/jobs:
  post:
    summary: Create a new job listing
    tags: [Jobs – Employer]
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateJobRequest'
    responses:
      201:
        description: Job created successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobListing'
      400:
        description: Validation error
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ValidationErrorResponse'
                - $ref: '#/components/schemas/ErrorResponse'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not an employer)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  get:
    summary: Get paginated job listings
    description: Public. Returns paginated job listings. All filter params are optional — omitting them returns all jobs.
    tags: [Jobs – Public]
    parameters:
      - in: query
        name: q
        required: false
        description: Keyword search across title, company, description, skills, and requirements (case-insensitive)
        schema:
          type: string
        example: software engineer
      - in: query
        name: location
        required: false
        description: Filter by location (partial match, case-insensitive)
        schema:
          type: string
        example: New York
      - in: query
        name: workType
        required: false
        description: Filter by work type
        schema:
          type: string
          enum: [Full-time, Part-time, Contract, Internship]
      - in: query
        name: page
        required: false
        description: Page number (starts at 1)
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: limit
        required: false
        description: Number of records per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      200:
        description: Paginated list of job listings
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaginatedJobsResponse'
      400:
        description: Validation error (invalid pagination query)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidationErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/jobs/stats:
  get:
    summary: Get my job statistics
    description: Employer-only. Returns counts of the authenticated employer's job listings and the applications they have received.
    tags: [Jobs – Employer]
    security:
      - BearerAuth: []
    responses:
      200:
        description: Job and application counts for the employer
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobStats'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not an employer)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/jobs/mine:
  get:
    summary: Get my job listings
    description: >
      Returns paginated jobs posted by the authenticated employer.
      Supports optional keyword search and status filtering.
    tags: [Jobs – Employer]
    security:
      - BearerAuth: []
    parameters:
      - in: query
        name: q
        required: false
        description: Keyword search across title, company, description, skills, and requirements (case-insensitive)
        schema:
          type: string
        example: engineer
      - in: query
        name: status
        required: false
        description: Filter by job status
        schema:
          type: string
          enum: [active, closed]
        example: active
      - in: query
        name: page
        required: false
        description: Page number (starts at 1)
        schema:
          type: integer
          minimum: 1
          default: 1
      - in: query
        name: limit
        required: false
        description: Number of records per page
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      200:
        description: Paginated list of the employer's own job listings
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaginatedMyJobsResponse'
      400:
        description: Validation error (invalid query params)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidationErrorResponse'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (employer role required)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/jobs/{id}:
  put:
    summary: Update a job listing
    tags: [Jobs – Employer]
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        description: MongoDB ObjectId of the job listing
        schema:
          type: string
          pattern: '^[a-f0-9]{24}$'
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateJobRequest'
    responses:
      200:
        description: Job updated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobListing'
      400:
        description: Validation error (invalid id or invalid payload)
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ValidationErrorResponse'
                - $ref: '#/components/schemas/ErrorResponse'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not employer or not owner of job)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      404:
        description: Job not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  delete:
    summary: Delete a job listing
    tags: [Jobs – Employer]
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        description: MongoDB ObjectId of the job listing
        schema:
          type: string
          pattern: '^[a-f0-9]{24}$'
    responses:
      200:
        description: Job deleted successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageResponse'
      400:
        description: Validation error (invalid id)
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ValidationErrorResponse'
                - $ref: '#/components/schemas/ErrorResponse'
      401:
        description: Unauthorized (missing or invalid token)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      403:
        description: Forbidden (not employer or not owner of job)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      404:
        description: Job not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      500:
        description: Server error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
